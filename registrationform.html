<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="regform.css">
</head>
<body>
    <h1>Student Registration Form</h1>
    <form>
    <p>User Name</p>
    <input type="text" id="user" name="username" placeholder="enter your username">
    <p>Email</p>
    <input type="email" placeholder="enter your email" name="email">
    <p>Password</p>
    <input type="password" placeholder="enter your password" name="password">
    <p>Gender</p>
    <input type="radio" name="gender" id="male">
    <label for="male">Male</label>
    <input type="radio" name="gender" id="female">
    <label for="female">Female</label>
    <input type="radio" name="gender" id="others">
    <label for="others">Others</label>
    <p>Skills</p>
    <input type="checkbox" name="Skills"><label for="Skills">HTML</label>
    <input type="checkbox" name="Skills"><label for="Skills">CSS</label>
    <input type="checkbox" name="Skills"><label for="Skills">JavaScript</label>
    <p>Message</p>
    <textarea cols="30" rows="4" name="Message" placeholder="Enter here"></textarea><br><br>
    <input class=btn type="submit" value="Register" >
    <form>
</body>
</html>
